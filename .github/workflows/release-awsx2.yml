name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  auto-bump:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version if already published on crates.io
        id: bump
        run: |
          VERSION=$(grep '^version' aws/awsx2/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: awsx2-ci/1.0" \
            "https://crates.io/api/v1/crates/awsx2/$VERSION")
          if [ "$STATUS" = "200" ]; then
            NEW=$(echo "$VERSION" | awk -F. '{printf "%s.%s.%d", $1, $2, $3+1}')
            echo "Version $VERSION already on crates.io — bumping to $NEW"
            sed -i "s/^version = \"$VERSION\"/version = \"$NEW\"/" aws/awsx2/Cargo.toml
            python3 - "$VERSION" "$NEW" << 'PYEOF'
          import re, sys
          ver, new = sys.argv[1], sys.argv[2]
          with open("aws/awsx2/Cargo.lock") as f:
              content = f.read()
          content = re.sub(
              r'(name = "awsx2"\nversion = ")' + re.escape(ver) + '"',
              r'\g<1>' + new + '"',
              content, count=1
          )
          with open("aws/awsx2/Cargo.lock", "w") as f:
              f.write(content)
          PYEOF
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add aws/awsx2/Cargo.toml aws/awsx2/Cargo.lock
            git commit -m "chore: bump awsx2 to $NEW"
            git push
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION not yet on crates.io — no bump needed"
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi

  check-version:
    needs: auto-bump
    if: needs.auto-bump.outputs.bumped != 'true'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.current }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          CURRENT_VERSION=$(grep '^version' aws/awsx2/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          git show HEAD~1:aws/awsx2/Cargo.toml > /tmp/old_cargo.toml 2>/dev/null || echo 'version = "0.0.0"' > /tmp/old_cargo.toml
          OLD_VERSION=$(grep '^version' /tmp/old_cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "old=$OLD_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$OLD_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed: $OLD_VERSION -> $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $CURRENT_VERSION"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-amd64
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-arm64
            cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross

      - name: Build
        shell: bash
        working-directory: aws/awsx2
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cd aws/awsx2/target/${{ matrix.target }}/release
          tar czf ${{ github.workspace }}/awsx2-${{ matrix.name }}.tar.gz awsx2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: awsx2-${{ matrix.name }}
          path: awsx2-${{ matrix.name }}.tar.gz

  release:
    needs: [check-version, build]
    if: always() && needs.check-version.outputs.changed == 'true' && !contains(needs.build.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*

  publish:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        working-directory: aws/awsx2
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
        run: cargo publish --allow-dirty
