name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve version (auto-bump patch if already tagged)
        id: version
        run: |
          CURRENT=$(grep '^version' aws/awsx2/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

          # Last released version = highest vX.Y.Z tag (created by the release job)
          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's/^v//')
          LAST_TAG=${LAST_TAG:-"0.0.0"}
          echo "Current: $CURRENT  Last tag: $LAST_TAG"

          if [ "$CURRENT" != "$LAST_TAG" ]; then
            echo "Version bumped since last release — proceeding with $CURRENT"
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
            echo "changed=true"     >> $GITHUB_OUTPUT
            exit 0
          fi

          # Version matches last tag — auto-bump patch and continue this run
          NEW=$(echo "$CURRENT" | awk -F. '{printf "%s.%s.%d", $1, $2, $3+1}')
          echo "Version $CURRENT already released — auto-bumping to $NEW"

          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" aws/awsx2/Cargo.toml

          python3 - "$CURRENT" "$NEW" << 'PYEOF'
          import re, sys
          ver, new = sys.argv[1], sys.argv[2]
          with open("aws/awsx2/Cargo.lock") as f:
              content = f.read()
          content = re.sub(
              r'(name = "awsx2"\nversion = ")' + re.escape(ver) + '"',
              r'\g<1>' + new + '"',
              content, count=1,
          )
          with open("aws/awsx2/Cargo.lock", "w") as f:
              f.write(content)
          PYEOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aws/awsx2/Cargo.toml aws/awsx2/Cargo.lock
          git commit -m "chore: bump awsx2 to $NEW"
          git push

          echo "version=$NEW"   >> $GITHUB_OUTPUT
          echo "changed=true"   >> $GITHUB_OUTPUT

  build:
    needs: prepare
    if: needs.prepare.outputs.changed == 'true'
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-amd64
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-arm64
            cross: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross

      - name: Build
        shell: bash
        working-directory: aws/awsx2
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cd aws/awsx2/target/${{ matrix.target }}/release
          tar czf ${{ github.workspace }}/awsx2-${{ matrix.name }}.tar.gz awsx2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: awsx2-${{ matrix.name }}
          path: awsx2-${{ matrix.name }}.tar.gz

  release:
    needs: [prepare, build]
    if: always() && needs.prepare.outputs.changed == 'true' && !contains(needs.build.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Create tag
        run: |
          git tag "v${{ needs.prepare.outputs.version }}"
          git push origin "v${{ needs.prepare.outputs.version }}"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: artifacts/*

  publish:
    needs: prepare
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        working-directory: aws/awsx2
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
        run: cargo publish --allow-dirty
